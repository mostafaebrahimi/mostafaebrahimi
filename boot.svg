<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace" font-size="14">
  <title>mostafa boots up: docker compose up mostafa — all skills healthy</title>
  <style>
    .win   { fill: #0d1b21; stroke: #2c5364; stroke-width: 1.5; }
    .bar   { fill: #12242c; }
    .ink   { fill: #e6edf3; }
    .dim   { fill: #9fb3c8; }
    .amber { fill: #f6ae2d; }
    .green { fill: #3fb950; }
    .cover { fill: #0d1b21; }

    .l, .s { opacity: 0; animation: show 0.01s linear forwards; }
    .sp    { opacity: 0; }
    @keyframes show { to { opacity: 1; } }
    @keyframes hide { to { opacity: 0; } }

    .type {
      transform-origin: 320px 0px;
      transform: scaleX(1);
      animation: type 1.7s steps(25, end) 0.5s forwards;
    }
    @keyframes type { to { transform: scaleX(0); } }

    .cursor { opacity: 0; animation: blink 1.1s steps(2, jump-none) 7.2s infinite; }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

    @media (prefers-reduced-motion: reduce) {
      .l, .s { opacity: 1; animation: none; }
      .sp, .type { display: none; }
      .cursor { opacity: 1; animation: none; }
    }
  </style>

  <!-- window -->
  <rect class="win" x="1" y="1" width="798" height="338" rx="10"/>
  <rect class="bar" x="2" y="2" width="796" height="34" rx="9"/>
  <rect class="bar" x="2" y="20" width="796" height="16"/>
  <circle cx="22" cy="19" r="5.5" fill="#e05252"/>
  <circle cx="42" cy="19" r="5.5" fill="#f6ae2d"/>
  <circle cx="62" cy="19" r="5.5" fill="#3fb950"/>
  <text x="400" y="24" text-anchor="middle" class="dim" font-size="12">mostafa@stack — zsh</text>

  <!-- command line with typing reveal -->
  <text x="24" y="70"><tspan class="amber">$</tspan><tspan class="ink" dx="8" textLength="212" xml:space="preserve">docker compose up mostafa</tspan></text>
  <rect class="cover type" x="44" y="56" width="216" height="20"/>

  <!-- compose header -->
  <text class="l" style="animation-delay:2.4s" x="24" y="98"><tspan class="dim">[+] Running 5/5</tspan></text>

  <!-- services -->
  <text class="sp" style="animation:show .01s 2.9s forwards, hide .01s 3.5s forwards" x="40" y="126"><tspan class="dim">⠿</tspan></text>
  <text class="l" style="animation-delay:2.9s" x="64" y="126"><tspan class="ink">backend</tspan><tspan class="dim" x="180">nestjs · typescript · node · fastapi</tspan></text>
  <text class="s" style="animation-delay:3.5s" y="126"><tspan class="green" x="40">✔</tspan><tspan class="green" x="600">healthy (10y)</tspan></text>

  <text class="sp" style="animation:show .01s 3.45s forwards, hide .01s 4.05s forwards" x="40" y="152"><tspan class="dim">⠿</tspan></text>
  <text class="l" style="animation-delay:3.45s" x="64" y="152"><tspan class="ink">data</tspan><tspan class="dim" x="180">postgres · mongo · redis · vectors</tspan></text>
  <text class="s" style="animation-delay:4.05s" y="152"><tspan class="green" x="40">✔</tspan><tspan class="green" x="600">ready</tspan></text>

  <text class="sp" style="animation:show .01s 4s forwards, hide .01s 4.6s forwards" x="40" y="178"><tspan class="dim">⠿</tspan></text>
  <text class="l" style="animation-delay:4s" x="64" y="178"><tspan class="ink">ai</tspan><tspan class="dim" x="180">llm-agents · rag · structured-extraction</tspan></text>
  <text class="s" style="animation-delay:4.6s" y="178"><tspan class="green" x="40">✔</tspan><tspan class="green" x="600">listening</tspan></text>

  <text class="sp" style="animation:show .01s 4.55s forwards, hide .01s 5.15s forwards" x="40" y="204"><tspan class="dim">⠿</tspan></text>
  <text class="l" style="animation-delay:4.55s" x="64" y="204"><tspan class="ink">infra</tspan><tspan class="dim" x="180">k8s · gitops · argo-cd · aws · linux</tspan></text>
  <text class="s" style="animation-delay:5.15s" y="204"><tspan class="green" x="40">✔</tspan><tspan class="green" x="600">synced</tspan></text>

  <text class="sp" style="animation:show .01s 5.1s forwards, hide .01s 5.7s forwards" x="40" y="230"><tspan class="dim">⠿</tspan></text>
  <text class="l" style="animation-delay:5.1s" x="64" y="230"><tspan class="ink">frontend</tspan><tspan class="dim" x="180">next.js · react</tspan></text>
  <text class="s" style="animation-delay:5.7s" y="230"><tspan class="green" x="40">✔</tspan><tspan class="green" x="600">rendered</tspan></text>

  <!-- summary -->
  <text class="l" style="animation-delay:6.3s" x="24" y="266"><tspan class="amber">mostafa is up</tspan><tspan class="dim"> · 10+ yrs uptime · 18 skills running · 0 bugs shipped (today)</tspan></text>

  <!-- resting prompt -->
  <text class="l" style="animation-delay:7s" x="24" y="298"><tspan class="amber">$</tspan></text>
  <text class="cursor ink" x="40" y="298">▌</text>
</svg>
